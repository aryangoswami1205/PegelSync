<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PegelSync icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A3A86"/>
      <stop offset="0.55" stop-color="#0E6BA8"/>
      <stop offset="1" stop-color="#12B3C7"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="360" x2="0" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8CEAF5"/>
      <stop offset="1" stop-color="#2AA6C4"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="196" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD97A"/>
      <stop offset="1" stop-color="#F6A821"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.66" stop-color="#FFC857" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#FFD97A" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFD97A" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round">
      <rect x="16" y="16" width="480" height="480" rx="112"/>
    </clipPath>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <g clip-path="url(#round)">
    <!-- Gauge staff on left, positioned clear of the droplet's glow radius -->
    <g stroke="#EAF6FF" stroke-width="12" stroke-linecap="round">
      <line x1="150" y1="126" x2="150" y2="420"/>
      <!-- major ticks (long, uniform) -->
      <line x1="150" y1="150" x2="206" y2="150"/>
      <line x1="150" y1="230" x2="206" y2="230"/>
      <line x1="150" y1="310" x2="206" y2="310"/>
      <line x1="150" y1="390" x2="206" y2="390"/>
    </g>
    <!-- minor ticks (short, uniform) -->
    <g stroke="#EAF6FF" stroke-width="9" stroke-linecap="round" opacity="0.8">
      <line x1="150" y1="190" x2="184" y2="190"/>
      <line x1="150" y1="270" x2="184" y2="270"/>
      <line x1="150" y1="350" x2="184" y2="350"/>
    </g>

    <!-- Pulse ring behind droplet (softened, radius reduced to fully clear the gauge ticks) -->
    <circle cx="326" cy="252" r="96" fill="url(#pulse)"/>

    <!-- Droplet marker (focal center) -->
    <g transform="translate(326 252)">
      <path d="M0 -66
               C 40 -16, 54 8, 54 36
               A 54 54 0 1 1 -54 36
               C -54 8, -40 -16, 0 -66 Z"
            fill="url(#drop)" stroke="#0A3A86" stroke-width="9"/>
      <!-- Bold circular sync arrows, unified heavier weight -->
      <g fill="#0A3A86">
        <path d="M-28 -2
                 A 30 30 0 0 1 26 -14
                 L 26 -26 L 48 -7 L 24 8 L 24 -6
                 A 22 22 0 0 0 -20 2 Z"/>
        <path d="M28 24
                 A 30 30 0 0 1 -26 36
                 L -26 48 L -48 29 L -24 14 L -24 28
                 A 22 22 0 0 0 20 20 Z"/>
      </g>
    </g>

    <!-- Waves -->
    <path d="M16 388
             C 104 360, 176 412, 264 396
             C 352 380, 420 352, 496 372
             L 496 496 L 16 496 Z"
          fill="#0E6BA8" opacity="0.55"/>
    <path d="M16 416
             C 108 388, 180 440, 268 424
             C 356 408, 420 384, 496 404
             L 496 496 L 16 496 Z"
          fill="url(#water)"/>
    <path d="M16 416
             C 108 388, 180 440, 268 424
             C 356 408, 420 384, 496 404"
          stroke="#EAFBFF" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>
</svg>
