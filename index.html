<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="PegelSync — Real-time flood risk monitoring for German rivers. Live telemetry, interactive WebGIS, and threshold alerting powered by AWS Lambda.">
  <title>PegelSync — Flood Risk Dashboard</title>

  <!-- ── Fonts ──────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- ── Leaflet.js ─────────────────────────────────────────────── -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- ── Application Stylesheet ─────────────────────────────────── -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ════════════════════════════════════════════════════════════════
       HEADER — Minimalist control banner
       ════════════════════════════════════════════════════════════════ -->
  <header id="app-header">
    <div class="header-bar">

      <!-- Brand -->
      <div class="brand">
        <span class="brand-icon">🌊</span>
        <div class="brand-text">
          <h1 class="brand-name">PegelSync</h1>
          <span class="brand-sub">Serverless Hydrological Monitoring</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="header-controls">

        <!-- System status indicator -->
        <span id="connection-indicator" class="sys-status sys-status--loading">
          <span class="sys-dot"></span>
          <span class="sys-label">Connecting</span>
        </span>

        <!-- Export CSV button -->
        <button id="export-report-btn" class="btn-utility" type="button" aria-label="Export station report as CSV">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span>Export</span>
        </button>

        <!-- Theme toggle -->
        <button id="theme-toggle" class="btn-icon" type="button" aria-label="Toggle light/dark theme">
          <!-- Sun icon (visible in dark mode) -->
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <!-- Moon icon (visible in light mode) -->
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ════════════════════════════════════════════════════════════════
       WORKSPACE — Split-pane spatial layout
       ════════════════════════════════════════════════════════════════ -->
  <main id="workspace">

    <!-- ── MAP PANE ─────────────────────────────────────────────── -->
    <section id="map-pane" aria-label="Station map">
      <div id="station-map"></div>
      <!-- Summary KPI strip, overlaid on map bottom -->
      <div id="kpi-strip">
        <div class="kpi">
          <span class="kpi-value" id="kpi-stations">—</span>
          <span class="kpi-label">Stations</span>
        </div>
        <div class="kpi-divider"></div>
        <div class="kpi">
          <span class="kpi-value" id="kpi-alerts">—</span>
          <span class="kpi-label">Alerts</span>
        </div>
        <div class="kpi-divider"></div>
        <div class="kpi">
          <span class="kpi-value kpi-value--ts" id="kpi-updated">—</span>
          <span class="kpi-label">Last Sync</span>
        </div>
      </div>
    </section>

    <!-- ── TELEMETRY MATRIX PANE ────────────────────────────────── -->
    <section id="matrix-pane" aria-label="Telemetry data matrix">
      <div class="matrix-header">
        <h2 class="matrix-title">Live Telemetry</h2>
        <span class="matrix-count" id="matrix-count">0 stations</span>
      </div>
      <div class="matrix-scroll" id="matrix-scroll">
        <!-- Loading state -->
        <div class="matrix-loading" id="matrix-loading">
          <div class="spinner"></div>
          <span>Acquiring telemetry feed…</span>
        </div>
        <!-- Table populated by app.js -->
        <table class="matrix-table" id="matrix-table" aria-label="Station telemetry data">
          <thead>
            <tr>
              <th class="col-status" aria-label="Status"></th>
              <th class="col-station">Station</th>
              <th class="col-level">Level</th>
              <th class="col-threshold">Threshold</th>
              <th class="col-gauge">Gauge</th>
              <th class="col-time">Updated</th>
            </tr>
          </thead>
          <tbody id="matrix-body">
            <!-- Rows injected dynamically -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- ════════════════════════════════════════════════════════════════
       FOOTER
       ════════════════════════════════════════════════════════════════ -->
  <footer id="app-footer">
    <span>Built by <strong>Aryan Goswami</strong></span>
    <span class="footer-sep">·</span>
    <span>Serverless on AWS</span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/aryangoswami1205/PegelSync" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <!-- ── Leaflet.js Runtime ─────────────────────────────────────── -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- ── Application Logic ──────────────────────────────────────── -->
  <script src="app.js"></script>
</body>

</html>
